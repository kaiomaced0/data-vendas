<div class="button-container">
  <button mat-raised-button color="primary" style="width: 100%; border-radius: 2px; background-color: green;"
    (click)="irParaNewVenda()">
    <mat-icon>add</mat-icon>
    Adicionar venda
  </button>
</div>
<table class="tabela-vendas">
  <thead>
    <tr>
      <th style="width: 10%;">ID</th>
      <th style="width: 40%;">Nome Empresa Cliente</th>
      <th style="width: 25%;">Observação</th>
      <th style="width: 15%;">Valor Total</th>
      <th style="width: 10%;">Editar</th>
    </tr>
  </thead>
  <tbody>
    @for(venda of vendas; track venda.id){
    <tr>
      <td>{{ venda.id }}</td>
      <td>{{ venda.cliente?.nomeEmpresa }}</td>
      <td>{{ venda.observacao }}</td>
      <td>R$ {{ venda.valorTotal}}</td>
      <td><button mat-icon-button (click)="editar(venda.id!)">
          <mat-icon>edit</mat-icon>
        </button></td>

    </tr>
    }

  </tbody>
</table>
